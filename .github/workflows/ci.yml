name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  docs:
    name: Документация (lint + ссылки)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !software/core/vendor/**

      - name: Проверка ссылок (lychee)
        uses: lycheeverse/lychee-action@v1
        # Внешние ссылки бывают нестабильны — не валим сборку, но видим отчёт.
        continue-on-error: true
        with:
          args: >-
            --no-progress
            --include-fragments
            --exclude-path software/core/vendor
            './**/*.md'

  python:
    name: Python (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: software
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Установка зависимостей
        run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check .
      - name: pytest
        run: pytest -q

  docker:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        # Пока правим стиль Dockerfile итеративно — предупреждения не валят CI.
        continue-on-error: true
        with:
          dockerfile: software/docker/Dockerfile.ingest
