# Конфиг markdownlint (CI). Прагматичный: смысл важнее косметики.
default: true
MD013: false        # длина строки — не ограничиваем
MD033: false        # inline HTML разрешён (details, br)
MD041: false        # первый элемент не обязан быть H1 (шапки-статусы)
MD024:
  siblings_only: true   # одинаковые заголовки в разных секциях допустимы
MD036: false        # выделение жирным вместо заголовка — допустимо
